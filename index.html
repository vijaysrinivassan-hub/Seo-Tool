<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Tool Form</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:560px;margin:40px auto;padding:20px}
    h1{margin-bottom:12px}
    input,textarea,button{width:100%;padding:12px;margin:0 0 12px;box-sizing:border-box;font:inherit}
    textarea{min-height:140px;resize:vertical}
    button{cursor:pointer;background:#111;color:#fff;border:none}
    #status{margin-top:8px;color:#555}
  </style>
</head>
<body>
  <h1>SEO Tool Form</h1>

  <form id="gform">
    <input name="entry.67257386" placeholder="Name" required />
    <input name="entry.450492180" type="email" placeholder="Email" required />
    <textarea name="entry.1531351596" placeholder="Query" required></textarea>
    <button type="submit">Submit</button>
  </form>

  <p id="status"></p>

  <script>
    const form = document.getElementById('gform');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Submitting...';

      const data = new FormData(form);

      try {
        await fetch('https://docs.google.com/forms/u/0/d/e/1FAIpQLSeVf86ILWS4t6f9Kx1bLmEVX3L1Q7q02ldwQwfM1TQWPSEqLw/formResponse', {
          method: 'POST',
          mode: 'no-cors',
          body: data
        });

        form.reset();
        status.style.color = 'green';
        status.textContent = 'Submitted. Check Google Sheets to confirm.';
      } catch (e) {
        status.style.color = 'red';
        status.textContent = 'Submission failed.';
      }
    });
  </script>
</body>
</html>
