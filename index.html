<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Tool Form</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:560px;margin:40px auto;padding:20px}
    h1{margin-bottom:18px}
    p{color:#555;margin-top:0}
    input,textarea,button{width:100%;padding:12px;margin:0 0 12px;box-sizing:border-box;font:inherit}
    textarea{min-height:140px;resize:vertical}
    button{cursor:pointer;background:#111;color:#fff;border:none}
    iframe{display:none}
    #success{display:none;color:green;margin-top:8px}
  </style>
</head>
<body>
  <h1>SEO Tool Form</h1>
  <p>Submit your query here.</p>

  <iframe name="hidden_iframe"></iframe>

  <form
    action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSeVf86ILWS4t6f9Kx1bLmEVX3L1Q7q02ldwQwfM1TQWPSEqLw/formResponse"
    method="POST"
    target="hidden_iframe"
    onsubmit="document.getElementById('success').style.display='block'; this.reset();"
  >
    <input name="entry.67257386" placeholder="Name" required />
    <input name="entry.450492180" type="email" placeholder="Email" required />
    <textarea name="entry.1531351596" placeholder="Query" required></textarea>
    <button type="submit">Submit</button>
  </form>

  <p id="success">Submitted successfully.</p>
</body>
</html>
